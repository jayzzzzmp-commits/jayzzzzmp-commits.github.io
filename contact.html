<style>
    .page-header {
        text-align: center;
        margin-bottom: 50px;
    }
    
    .page-header h1 {
        font-size: 2.8em;
        margin-bottom: 10px;
        letter-spacing: -1px; /* 标题字间距微缩，显得更紧凑高级 */
    }
    
    /* 核心科技：CSS Grid 左右分栏 */
    .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr; /* 分两列，左右各占 1 份 */
        gap: 30px; 
    }

    /* 左右两张卡片的通用底漆 */
    .contact-card {
        background-color: #ffffff;
        border: 1px solid #E0DBCF;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
        transition: transform 0.3s ease, border-color 0.3s;
    }
    
    .contact-card:hover {
        transform: translateY(-5px); /* 悬浮动作 */
        border-color: var(--accent-color); /* 边框亮起理性蓝 */
    }

    .card-title {
        font-size: 1.3em;
        font-weight: 700;
        margin-bottom: 25px;
        color: #111;
        border-bottom: 2px solid var(--navbar-bg);
        padding-bottom: 15px;
    }

    /* 左侧信息列表排版 */
    .contact-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .contact-list li {
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        font-size: 1.05em;
    }
    .contact-list li b {
        /* 核心修复区：拓宽物理边界，给 WeChat 留足空间，防止图标掉下去 */
        width: 120px; 
        color: #111;
        white-space: nowrap; /* 绝对力场：强制内部文字永远不准换行 */
    }
    
    /* 右侧社交链接按钮化 */
    .social-link {
        display: flex; /* 开启弹性布局 */
        justify-content: space-between; /* 图标文字靠左，箭头靠右 */
        align-items: center;
        padding: 12px 20px;
        margin-bottom: 15px;
        background-color: var(--navbar-bg);
        color: var(--text-color);
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        width: 100%;
        box-sizing: border-box;
        transition: all 0.2s;
        border: 1px solid transparent;
    }
    .social-link:hover {
        background-color: var(--accent-color);
        color: #fff;
        box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2);
    }
    
    /* 物理级自适应：手机端变上下堆叠 */
    @media (max-width: 600px) {
        .contact-grid { grid-template-columns: 1fr; }
    }
</style>
