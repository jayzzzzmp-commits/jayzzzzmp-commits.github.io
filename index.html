<style>
    /* --- 1. 英雄欢迎卡 (Hero Section) --- */
    .hero-card {
        background-color: #ffffff;
        border: 1px solid #E0DBCF;
        border-radius: 20px;
        padding: 50px 40px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.02);
        margin-bottom: 30px;
        transition: all 0.3s;
    }
    .hero-card:hover { transform: translateY(-5px); }

    #dynamic-time { font-family: monospace; font-size: 1.6em; color: var(--secondary-text); margin: 0; }
    #welcome-greeting { font-size: 3em; font-weight: 800; margin: 10px 0; letter-spacing: -2px; color: #111; line-height: 1.1; }
    .subtitle { color: var(--secondary-text); margin: 0; font-size: 1.1em; }

    /* --- 2. 挂件网格区域 (Widgets Grid) --- */
    .widgets-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; margin-bottom: 50px; }
    .widget-card { background-color: #ffffff; border: 1px solid #E0DBCF; border-radius: 16px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.01); }
    .section-title { font-size: 0.85em; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); margin-bottom: 25px; margin-top: 0; }

    /* 每日一言与音乐 */
    .quote-content { font-family: serif; font-size: 1.3em; color: #333; line-height: 1.6; font-style: italic; margin-bottom: 15px; }
    .quote-author { text-align: right; color: var(--secondary-text); font-size: 0.9em; }

    /* --- 3. 列表区域 --- */
    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .list-header h2 { font-size: 1.8em; margin: 0; color: #111; }
    .view-all { color: var(--accent-color); text-decoration: none; font-size: 0.9em; }

    .article-card {
        background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #E0DBCF;
        transition: all 0.2s; text-decoration: none; color: inherit; display: block; margin-bottom: 20px;
    }
    .article-card:hover { border-color: var(--accent-color); transform: scale(1.01); }
    .post-date { color: #888; font-size: 0.85em; font-family: monospace; }
    .post-title { font-size: 1.2em; font-weight: bold; color: #111; margin: 5px 0; }

</style>
