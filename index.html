<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Builder System</title>
    <style>
        /* 基础油漆：去掉默认白边，让网页彻底贴合屏幕 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }

        /* --- 核心科技：暗黑导航栏 --- */
        .navbar {
            background-color: #000; /* 极客黑底色 */
            color: #fff;
            display: flex; /* 开启 Flexbox 弹性布局，排版的神器 */
            justify-content: space-between; /* 元素向两端拉开对齐 */
            align-items: center; /* 垂直居中 */
            padding: 15px 40px; /* 上下15px，左右40px的内边距 */
        }

        .nav-brand {
            font-size: 1.2em;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 链接区域排版 */
        .nav-links {
            display: flex;
            gap: 30px; /* 链接之间空出 30px 的间距 */
            align-items: center;
        }

        /* 链接的默认样子 */
        .nav-links a {
            color: #fff;
            text-decoration: none; /* 去掉丑陋的下划线 */
            font-size: 0.95em;
            transition: color 0.3s; /* 变色时加个0.3秒的平滑动画 */
        }

        /* 鼠标悬停在链接上时的反应 */
        .nav-links a:hover {
            color: #888; /* 变灰 */
        }

        /* Get in touch 红色战斗按钮特调 */
        .btn-contact {
            background-color: #e60000; /* 南孚同款红 */
            color: #fff !important; /* 强制白字 */
            padding: 8px 20px;
            border-radius: 20px; /* 胶囊圆角 */
            font-weight: bold;
        }

        .btn-contact:hover {
            background-color: #cc0000; /* 鼠标放上去颜色加深 */
        }
        /* ------------------------------- */

        /* 之前的内容区，用一个容器包起来居中 */
        .content {
            max-width: 800px;
            margin: 50px auto; /* 距离导航栏往下推50px */
            padding: 20px;
        }
        h1 { color: #1a1a1a; }
        .tag { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">JAY'S SYSTEM</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="blog.html">Blog</a>
            <a href="contact.html" class="btn-contact">Get in touch &rarr;</a>
        </div>
    </nav>

    <div class="content">
        <h1 id="dynamic-title">Loading time...</h1>
        <p>这里是我的个人硅基阵地。我将在这里输出关于 <b>供应链风险管理 (SCRM)</b> 与 <b>AI 自动化流程</b> 的第一性原理推演。</p>
        <p class="tag">Next: 《库克供应链神迹与单点故障》</p>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const ukTime = now.toLocaleTimeString('en-GB', { timeZone: 'Europe/London' });
            document.getElementById('dynamic-title').innerText = ukTime + " | Welcome to my personal website";
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
