<style>
    /* --- 1. 标题与分类标签页 --- */
    .gallery-header { margin-bottom: 50px; }
    .gallery-header h1 { font-size: 2.8em; margin-bottom: 10px; color: #111; letter-spacing: -1px; }
    .gallery-header p { color: var(--secondary-text); margin: 0; }

    .gallery-tabs {
        display: flex; background-color: #f1f3f5; border-radius: 12px;
        padding: 4px; max-width: fit-content; margin-top: 30px;
    }
    .tab-btn {
        padding: 8px 24px; border-radius: 10px; border: none; background: none;
        cursor: pointer; transition: all 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
        color: var(--secondary-text); font-size: 0.9em; font-weight: 600; text-decoration: none;
    }
    .tab-btn.tab-active { background-color: #fff; color: #111; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

    /* --- 2. 核心科技：真正的自适应原生瀑布流 (摄影区) --- */
    .true-masonry {
        column-count: 3; /* 强制分为 3 列 */
        column-gap: 20px; /* 列之间的间距 */
        margin-top: 10px;
    }

    .fluid-photo {
        break-inside: avoid; /* 绝对防御：防止一张照片被强行切到下一列 */
        margin-bottom: 20px; /* 上下照片的间距 */
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid #E0DBCF;
        background-color: #fbfbf7;
        transition: all 0.3s ease;
        cursor: pointer;
        position: relative;
    }

    .fluid-photo:hover {
        transform: translateY(-3px); 
        box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
        border-color: var(--accent-color); 
    }

    /* 高度解绑！让图片自己撑开画框 */
    .fluid-photo img {
        width: 100%; 
        height: auto; /* 完美保留原图比例 */
        display: block;
    }
    
    /* 手机端自适应变成两列 */
    @media (max-width: 600px) {
        .true-masonry { column-count: 2; }
    }

    /* ===============================================================
       ================= 核心升级：精致专辑网格 (image_8.png 格式) =================
       =============================================================== */
    
    /* 物理层：包裹两个 Pane 的视窗，开启隐藏溢出 */
    .gallery-wrapper { overflow: hidden; margin-top: 40px; }
    .gallery-wrapper-inner { display: flex; width: 200%; transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); }
    .gallery-pane { width: 50%; transition: opacity 0.4s ease; opacity: 0.8; }
    .gallery-pane.active { opacity: 1; }

    /* 物理级疏通：强制專輯网格为 3 列，不使用 dense 流 */
    .album-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 固定 3 列 */
        gap: 30px; /* 加大间距以区分不同专辑 */
        text-align: left; /* image_8.png 文字左对齐质感 */
    }

    /* 每一个专辑卡片实体 (带有 image_1.png hover 质感) */
    .album-card {
        transition: transform 0.3s ease, border-color 0.3s;
        cursor: pointer;
    }
    .album-card:hover { transform: translateY(-5px); }

    /* 封面视窗 (image_8.png 的方形圆角) */
    .cover-wrap {
        background-color: #fbfbf7;
        border: 1px solid #E0DBCF;
        border-radius: 20px; /* image_8.png 的大圆角物理层 */
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02); /* 柔和阴影 */
        transition: all 0.3s ease;
        
        /* 核心自适应技术：强制方形圆角容器 */
        aspect-ratio: 1 / 1; 
        display: flex; align-items: center; justify-content: center; /* 占位符文字居中 */
        position: relative;
    }
    .album-card:hover .cover-wrap {
        border-color: var(--accent-color); /* 悬浮时边框亮起 */
        box-shadow: 0 10px 30px rgba(74, 144, 226, 0.05); /* 奶油蓝柔光阴影 */
    }

    /* 真正的专辑封面链接 (实现“根据图片尺寸灵活变动、自适应填充”) */
    .album-cover {
        width: 100%; height: 100%; object-fit: cover; /* 物理参数：覆盖并填充方形区域 */
    }

    .cover-placeholder {
        position: absolute; pointer-events: none; color: #999; font-family: monospace;
    }

    /* 文字信息区域排版 (image_8.png 质感) */
    .album-info {
        padding: 15px 5px 5px 5px; /* image_8.png 的文字左对齐质感 */
    }
    .album-title {
        font-size: 1.1em; font-weight: 700; margin: 0 0 5px 0; color: #111;
    }
    .album-artist {
        font-size: 0.9em; color: var(--secondary-text); margin: 0;
    }

    /* --- 3. 灯箱 (Lightbox) --- */
    .lightbox {
        display: none; position: fixed; z-index: 1000; top: 0; left: 0;
        width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); 
        backdrop-filter: blur(5px); justify-content: center; align-items: center;
    }
    .close-lightbox { position: absolute; top: 20px; right: 35px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .close-lightbox:hover { color: #bbb; }
    .lightbox-content { margin: auto; display: block; max-width: 90%; max-height: 90%; animation: zoomIn 0.3s; }
    @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* 自适应：在手机端将瀑布流和专辑网格都变成2列 */
    @media (max-width: 600px) {
        .gallery-header h1 { font-size: 2.2em; }
        .masonry-grid, .album-grid { grid-template-columns: repeat(2, 1fr); gap: 15px;}
    }
</style>

<script>
    const wrapperInner = document.getElementById('gallery-inner');
    const photographyPane = document.getElementById('pane-photography');
    const albumPane = document.getElementById('pane-album');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const closeBtn = document.getElementById('close-lightbox');

    // 🎯 修复点 1：通讯录更新，寻找最新的摄影网格 ID
    const photographyGrid = document.querySelector('#photography-grid');
    const albumGrid = document.querySelector('.album-grid');

    photographyGrid.addEventListener('click', handleGridClick);
    albumGrid.addEventListener('click', handleGridClick);

    function handleGridClick(e) {
        // 🎯 修复点 2：通讯录更新，寻找最新的摄影卡片类名 (.fluid-photo)
        const item = e.target.closest('.fluid-photo') || e.target.closest('.cover-wrap');
        if (!item) return;
        
        const img = item.querySelector('img');
        // 只有当图片真正有链接 (且不为 0xcafebabe 级别的透明占位图) 时才触发放大
        if (img && img.src && img.style.opacity !== '0' && img.src !== window.location.href) {
            lightboxImg.src = img.src;
            lightbox.style.display = 'flex';
        }
    }

    // 关闭灯箱的逻辑
    function closeLightbox() { lightbox.style.display = 'none'; }
    closeBtn.addEventListener('click', closeLightbox);
    
    // 点击灯箱外部也可关闭
    lightbox.addEventListener('click', function(e) {
        if (e.target !== lightboxImg) closeLightbox();
    });

    // ================= iOS 风格滑动过度逻辑 =================
    const tabGroup = document.querySelector('.gallery-tabs');
    tabGroup.addEventListener('click', function(e) {
        const clickedBtn = e.target.closest('.tab-btn');
        if (!clickedBtn) return;
        e.preventDefault();

        // 1. 更新按钮状态
        tabGroup.querySelector('.tab-active').classList.remove('tab-active');
        const inactiveTab = tabGroup.querySelector('.tab-inactive');
        if (inactiveTab) inactiveTab.classList.add('tab-inactive'); 

        clickedBtn.classList.remove('tab-inactive');
        clickedBtn.classList.add('tab-active');

        tabGroup.querySelectorAll('.tab-btn:not(.tab-active)').forEach(btn => {
            btn.classList.add('tab-inactive');
        });

        // 2. 物理穿梭：实现滑动过度感
        const isAlbum = clickedBtn.innerText.includes('专辑');
        if (isAlbum) {
            wrapperInner.style.transform = 'translateX(-50%)'; // 滑动到专辑 Pane
            photographyPane.classList.remove('active');
            albumPane.classList.add('active');
        } else {
            wrapperInner.style.transform = 'translateX(0%)'; // 滑动回摄影 Pane
            albumPane.classList.remove('active');
            photographyPane.classList.add('active');
        }
    });
</script>
