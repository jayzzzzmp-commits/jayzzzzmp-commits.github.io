layout: default
title: Gallery - My life
---

<style>
    /* --- 1. 标题与分类标签 --- */
    .gallery-header { margin-bottom: 50px; }
    .gallery-header h1 { font-size: 2.8em; margin-bottom: 10px; color: #111; letter-spacing: -1px; }
    .gallery-header p { color: var(--secondary-text); margin: 0; }

    .gallery-tabs { display: flex; gap: 15px; margin-top: 30px; }
    .tab-btn {
        padding: 6px 20px; border-radius: 15px; font-size: 0.9em; font-weight: 600;
        cursor: pointer; text-decoration: none; transition: all 0.2s;
        border: 1px solid #E0DBCF;
    }
    /* 激活态（摄影） */
    .tab-active { background-color: #fff; color: #111; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
    /* 未激活态（专辑） */
    .tab-inactive { background-color: var(--navbar-bg); color: var(--secondary-text); }
    .tab-inactive:hover { background-color: #E0DBCF; color: #111; }

    /* --- 2. 核心科技：非规则瀑布流排版 (CSS Grid) --- */
    .masonry-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 完美的3列分栏 */
        gap: 20px;
        grid-auto-flow: dense; /* 紧密填充，自动补位 */
        margin-top: 40px;
    }

    /* 单个照片卡片样式 (依据 image_9.png 质感优化) */
    .photo-item {
        background-color: #fbfbf7; /* 比羊皮纸背景稍白，增加层次感 */
        border: 1px solid #E0DBCF;
        border-radius: 16px;
        overflow: hidden; /* 防止图片溢出圆角 */
        display: flex; align-items: center; justify-content: center;
        color: #999; font-style: italic; font-family: serif;
        transition: all 0.3s ease;
        cursor: pointer; /* 鼠标悬停显示小手，暗示可交互 */
    }

    /* 悬停时的物理级反馈 */
    .photo-item:hover {
        transform: translateY(-3px); /* 微幅上浮 */
        box-shadow: 0 10px 30px rgba(0,0,0,0.03); /* 柔和阴影 */
        border-color: var(--accent-color); /* 边框亮起理性蓝 */
    }

    /* 依据 image_9.png 精确设置卡片的特定物理跨度 */
    /* portrait (长方形卡片) */
    .portrait { grid-row: span 2; height: 320px; } /* 跨2行 */
    /* square (正方形卡片) */
    .square { grid-row: span 1; height: 160px; }   /* 跨1行 */

    /* 真正的摄影作品链接（将来在这里替换图片路径） */
    .photo-item img {
        width: 100%; height: 100%;
        object-fit: cover; /* 强制图片填满卡片，裁切非核心区域 */
    }

    /* --- 3. Lightbox (灯箱放大) 全屏覆盖层 --- */
    .lightbox {
        display: none; /* 默认隐藏 */
        position: fixed; z-index: 1000; top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.85); /* 黑色半透明背景 */
        backdrop-filter: blur(5px); /* 背景模糊效果 */
        justify-content: center; align-items: center;
    }
    
    /* 关闭按钮 */
    .close-lightbox {
        position: absolute; top: 20px; right: 35px; color: #fff;
        font-size: 40px; font-weight: bold; cursor: pointer;
        transition: 0.3s;
    }
    .close-lightbox:hover { color: #bbb; }
    
    /* 放大后的大图样式 */
    .lightbox-content {
        margin: auto; display: block; max-width: 90%; max-height: 90%;
        animation: zoomIn 0.3s; /* 放大动画 */
    }
    
    /* 放大动画的第一性原理声明 */
    @keyframes zoomIn {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    /* 自适应方案：在手机端将瀑布流变成2列 */
    @media (max-width: 600px) {
        .gallery-header h1 { font-size: 2.2em; }
        .masonry-grid { grid-template-columns: repeat(2, 1fr); }
    }
</style>

<div class="gallery-header">
    <h1>Gallery</h1>
    <p>收藏光影与旋律。 (声色存档协议)</p>
    
    <div class="gallery-tabs">
        <a href="gallery.html" class="tab-btn tab-active">摄影</a>
        <a href="#" class="tab-btn tab-inactive">专辑</a>
    </div>
</div>

<div class="masonry-grid" id="masonry-grid">
    
    <div class="photo-item portrait"><img src="your-photo-1.jpg" alt="Photo 1"></div>
    <div class="photo-item portrait"><img src="your-photo-4.jpg" alt="Photo 4"></div>
    <div class="photo-item portrait"><img src="your-photo-7.jpg" alt="Photo 7"></div>

    <div class="photo-item square"><img src="your-photo-2.jpg" alt="Photo 2"></div>
    <div class="photo-item square"><img src="your-photo-5.jpg" alt="Photo 5"></div>
    <div class="photo-item square"><img src="your-photo-8.jpg" alt="Photo 8"></div>
    
    <div class="photo-item portrait"><img src="your-photo-3.jpg" alt="Photo 3"></div>
    <div class="photo-item portrait"><img src="your-photo-6.jpg" alt="Photo 6"></div>
    <div class="photo-item portrait"><img src="your-photo-9.jpg" alt="Photo 9"></div>
</div>

<div id="lightbox" class="lightbox">
    <span class="close-lightbox" id="close-lightbox">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
</div>


<script>
    const grid = document.getElementById('masonry-grid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const closeBtn = document.getElementById('close-lightbox');

    // 监听网格的点击事件（利用事件委托降低性能算力消耗）
    grid.addEventListener('click', function(e) {
        // 找到被点击的卡片内的 <img> 标签
        const img = e.target.closest('.photo-item').querySelector('img');
        if (img) {
            // 将图片的路径复制给全屏大图，并显示灯箱
            lightboxImg.src = img.src;
            lightbox.style.display = 'flex';
        }
    });

    // 关闭灯箱的逻辑
    function closeLightbox() { lightbox.style.display = 'none'; }
    closeBtn.addEventListener('click', closeLightbox);
    
    // 点击灯箱外部也可关闭
    lightbox.addEventListener('click', function(e) {
        if (e.target !== lightboxImg) closeLightbox();
    });
</script>
